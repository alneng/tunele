name: Backend CI/CD

on:
  push:
    branches:
      - master
      # - develop
    paths:
      - "src/backend/**"
  workflow_dispatch: # Allows manual execution of the workflow
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

# Prevent concurrent deployments to the same environment
concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-api
  CONTAINER_NAME: tunele-api

jobs:
  # Run lint check before build
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run linting
        run: yarn lint

  # Run tests before build
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

  # Build Docker image only after lint and test pass
  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tags.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Pushes to master are tagged as: latest, {sha}
      # [Disabled] Pushes to develop are tagged as: preview, preview-{sha}
      # Pushes from workflow_dispatch are tagged based on the environment selected
      - name: Set image tags
        id: tags
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          # elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
          #   echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:preview,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:preview-${{ github.sha }}" >> $GITHUB_OUTPUT
          #   echo "image_tag=preview-${{ github.sha }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.environment }}" == "production" ]]; then
              echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT
              echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
            else
              echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:preview,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:preview-${{ github.sha }}" >> $GITHUB_OUTPUT
              echo "image_tag=preview-${{ github.sha }}" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/backend/docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to k3s cluster after successful build
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: prod
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Determine overlay
        id: overlay
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "path=k8s/overlays/prod" >> $GITHUB_OUTPUT
            echo "namespace=tunele-prod" >> $GITHUB_OUTPUT
            echo "context=tunele-prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.environment }}" == "production" ]]; then
              echo "path=k8s/overlays/prod" >> $GITHUB_OUTPUT
              echo "namespace=tunele-prod" >> $GITHUB_OUTPUT
              echo "context=tunele-prod" >> $GITHUB_OUTPUT
            else
              echo "path=k8s/overlays/preview" >> $GITHUB_OUTPUT
              echo "namespace=tunele-preview" >> $GITHUB_OUTPUT
              echo "context=tunele-preview" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Deploy
        run: |
          set -e
          cd ${{ steps.overlay.outputs.path }}
          kustomize edit set image ghcr.io/alneng/tunele-api=ghcr.io/alneng/tunele-api:${{ needs.build.outputs.image_tag }}
          kubectl apply -k . --context=${{ steps.overlay.outputs.context }}

      - name: Wait for rollout
        run: |
          if ! kubectl rollout status deployment/tunele-api \
            --namespace ${{ steps.overlay.outputs.namespace }} \
            --context=${{ steps.overlay.outputs.context }} \
            --timeout=120s; then
            echo "Rollout failed, initiating rollback"
            kubectl rollout undo deployment/tunele-api \
              --namespace ${{ steps.overlay.outputs.namespace }} \
              --context=${{ steps.overlay.outputs.context }}
            echo "Rollback initiated, waiting for previous revision to stabilize"
            if ! kubectl rollout status deployment/tunele-api \
              --namespace ${{ steps.overlay.outputs.namespace }} \
              --context=${{ steps.overlay.outputs.context }} \
              --timeout=60s; then
              echo "Rollback also failed — manual intervention required"
            fi
            exit 1
          fi
